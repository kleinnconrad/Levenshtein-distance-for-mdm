name: Deploy Databricks Asset Bundle

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'resources/**/*.yml'
      - 'databricks.yml'

env:
  DATABRICKS_HOST: "https://dbc-91e4a242-418c.cloud.databricks.com"

jobs:
  test_and_lint:
    name: Run Tests and Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Recommended to match your Databricks Runtime

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8 pandas Levenshtein

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all other issues as warnings
          flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run unit tests with pytest
        run: |
          pytest tests/

  validate_and_deploy:
    name: Validate and Deploy Bundle
    needs: test_and_lint # This ensures deployment ONLY happens if tests pass
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks Bundle
        run: databricks bundle validate
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: Deploy Databricks Bundle
        run: databricks bundle deploy -t default 
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          
